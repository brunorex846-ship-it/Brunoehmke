<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            font-size: 2.5em;
        }

        #gameCanvas {
            border: 3px solid #fff;
            background: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            display: block;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 800px;
            color: #fff;
            font-size: 1.5em;
            text-align: center;
        }

        .score-section {
            flex: 1;
        }

        .score-section h2 {
            font-size: 1em;
            margin-bottom: 10px;
            color: #87ceeb;
        }

        .score-section .score {
            font-size: 2.5em;
            font-weight: bold;
            color: #ffff00;
        }

        .instructions {
            color: #fff;
            text-align: center;
            max-width: 600px;
            line-height: 1.6;
            font-size: 0.9em;
        }

        .instructions p {
            margin: 5px 0;
        }

        .key {
            background: #444;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏓 PONG GAME 🏓</h1>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="scoreboard">
            <div class="score-section">
                <h2>Player (Left)</h2>
                <div class="score" id="playerScore">0</div>
            </div>
            <div class="score-section">
                <h2>Computer (Right)</h2>
                <div class="score" id="computerScore">0</div>
            </div>
        </div>

        <div class="instructions">
            <p><strong>Controls:</strong></p>
            <p>Move Left Paddle: <span class="key">↑</span> <span class="key">↓</span> Arrow Keys or <span class="key">Mouse</span></p>
            <p>The right paddle is controlled by the computer AI</p>
            <p><strong>Objective:</strong> Score points by making the ball pass the opponent's paddle!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 8;

        const player = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6,
            score: 0
        };

        const computer = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            speed: 4,
            score: 0
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: -4,
            dy: 4,
            size: ballSize,
            speed: 5
        };

        // Input handling
        const keys = {};
        let mouseY = canvas.height / 2;

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        // Update player paddle position
        function updatePlayer() {
            // Keyboard controls
            if (keys['ArrowUp'] && player.y > 0) {
                player.y -= player.speed;
            }
            if (keys['ArrowDown'] && player.y + player.height < canvas.height) {
                player.y += player.speed;
            }

            // Mouse control
            if (mouseY - player.height / 2 < 0) {
                player.y = 0;
            } else if (mouseY + player.height / 2 > canvas.height) {
                player.y = canvas.height - player.height;
            } else {
                player.y = mouseY - player.height / 2;
            }
        }

        // Update computer paddle position (AI)
        function updateComputer() {
            const computerCenter = computer.y + computer.height / 2;
            const ballCenter = ball.y;

            // Simple AI: follow the ball
            if (computerCenter < ballCenter - 35) {
                computer.y += computer.speed;
            } else if (computerCenter > ballCenter + 35) {
                computer.y -= computer.speed;
            }

            // Keep computer paddle in bounds
            if (computer.y < 0) {
                computer.y = 0;
            } else if (computer.y + computer.height > canvas.height) {
                computer.y = canvas.height - computer.height;
            }
        }

        // Update ball position
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom walls
            if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.size, Math.min(canvas.height - ball.size, ball.y));
            }

            // Ball collision with paddles
            if (
                ball.x - ball.size < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = -ball.dx;
                ball.x = player.x + player.width + ball.size;
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (player.y + player.height / 2)) / (player.height / 2);
                ball.dy = hitPos * ball.speed;
            }

            if (
                ball.x + ball.size > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height
            ) {
                ball.dx = -ball.dx;
                ball.x = computer.x - ball.size;
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (computer.y + computer.height / 2)) / (computer.height / 2);
                ball.dy = hitPos * ball.speed;
            }

            // Ball out of bounds (scoring)
            if (ball.x < 0) {
                computer.score++;
                resetBall();
            }
            if (ball.x > canvas.width) {
                player.score++;
                resetBall();
            }
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 4;
            ball.dy = (Math.random() - 0.5) * 4;
        }

        // Draw functions
        function drawPaddle(x, y, width, height) {
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(x, y, width, height);
            // Add glow effect
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.5)';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, width, height);
        }

        function drawBall(x, y, size) {
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
            // Add glow
            ctx.strokeStyle = 'rgba(255, 0, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawCenterLine() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            drawCenterLine();

            // Draw paddles
            drawPaddle(player.x, player.y, player.width, player.height);
            drawPaddle(computer.x, computer.y, computer.width, computer.height);

            // Draw ball
            drawBall(ball.x, ball.y, ball.size);
        }

        function updateScore() {
            document.getElementById('playerScore').textContent = player.score;
            document.getElementById('computerScore').textContent = computer.score;
        }

        // Main game loop
        function gameLoop() {
            updatePlayer();
            updateComputer();
            updateBall();
            updateScore();
            draw();

            requestAnimationFrame(gameLoop);
        }
        {function createParticles(x, y, color, amount = 10) {
    for (let i = 0; i < amount; i++) {
        particles.push({
            x,
            y,
            dx: (Math.random() - 0.5) * 6,
            dy: (Math.random() - 0.5) * 6,
            radius: Math.random() * 4 + 1,
            alpha: 1,
            color
        });
    }
}
         {function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        p.x += p.dx;
        p.y += p.dy;

        p.alpha -= 0.02;

        if (p.alpha <= 0) {
            particles.splice(i, 1);
        }
    }
}}

        // Start the game
        gameLoop();
    </script>
</body>
</html>
