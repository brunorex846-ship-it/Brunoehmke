<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative;
        }

        h1 {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            font-size: 2.5em;
        }

        #canvasWrapper {
            position: relative;
            display: inline-block;
        }

        #gameCanvas {
            border: 3px solid #fff;
            background: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            display: block;
        }

        /* Start button centered over the canvas */
        #startButton {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(180deg, #ff8c00, #ff4500);
            color: #fff;
            border: none;
            padding: 14px 28px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(255, 69, 0, 0.35);
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            color: #fff;
            font-size: 1em;
        }

        .difficulty-btn {
            padding: 8px 12px;
            border-radius: 6px;
            border: 2px solid transparent;
            background: #222;
            color: #fff;
            cursor: pointer;
            transition: all 0.12s ease-in-out;
        }

        .difficulty-btn:hover {
            transform: translateY(-2px);
        }

        .difficulty-btn.active {
            background: linear-gradient(180deg, #4caf50, #2e7d32);
            border-color: #c8f7c5;
            color: #fff;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 800px;
            color: #fff;
            font-size: 1.5em;
            text-align: center;
        }

        .score-section {
            flex: 1;
        }

        .score-section h2 {
            font-size: 1em;
            margin-bottom: 10px;
            color: #87ceeb;
        }

        .score-section .score {
            font-size: 2.5em;
            font-weight: bold;
            color: #ffff00;
        }

        .instructions {
            color: #fff;
            text-align: center;
            max-width: 600px;
            line-height: 1.6;
            font-size: 0.9em;
        }

        .instructions p {
            margin: 5px 0;
        }

        .key {
            background: #444;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>🏓 PONG GAME 🏓</h1>

        <div class="controls" id="difficultyControls">
            <label style="color:#fff;">Dificuldade:</label>
            <button class="difficulty-btn" data-difficulty="easy">Fácil</button>
            <button class="difficulty-btn active" data-difficulty="medium">Médio</button>
            <button class="difficulty-btn" data-difficulty="hard">Difícil</button>
            <button class="difficulty-btn" data-difficulty="insane">Impossível</button>
        </div>

        <div id="canvasWrapper">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            <button id="startButton">INICIAR</button>
        </div>

        <div class="scoreboard">
            <div class="score-section">
                <h2>Jogador (Esquerda)</h2>
                <div class="score" id="playerScore">0</div>
            </div>
            <div class="score-section">
                <h2>Computador (Direita)</h2>
                <div class="score" id="computerScore">0</div>
            </div>
        </div>

        <div class="instructions">
            <p><strong>Controles:</strong></p>
            <p>Move o Paddle Esquerdo: <span class="key">↑</span> <span class="key">↓</span> ou com o <span class="key">Mouse</span></p>
            <p>O paddle direito é controlado pela IA do computador</p>
            <p><strong>Objetivo:</strong> Faça a bola passar pelo paddle do oponente para marcar pontos!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 8;

        const player = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6,
            score: 0
        };

        const computer = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            speed: 4,
            reaction: 35, // distância antes de reagir (quanto menor = mais difícil)
            score: 0
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: -4,
            dy: 4,
            size: ballSize,
            speed: 5
        };

        // Power-ups: yellow (speed boost), blue (freeze enemy 1s), green (slow enemy 3s)
        const powerUps = [];
        const powerUpRadius = 12;
        let powerUpSpawnTimer = null;
        let powerUpLoopActive = false;

        // Active effect timers to restore states
        let activeComputerTimer = null;
        let activeBallTimer = null;
        let originalComputerSpeed = computer.speed;
        let originalBallSpeed = ball.speed;

        // Difficulty configurations (4 níveis)
        const difficulties = {
            easy:   { computerSpeed: 3, computerReaction: 60, ballSpeed: 4, playerSpeed: 9 },
            medium: { computerSpeed: 4, computerReaction: 35, ballSpeed: 5, playerSpeed: 7 },
            hard:   { computerSpeed: 6, computerReaction: 20, ballSpeed: 6, playerSpeed: 6 },
            insane: { computerSpeed: 8, computerReaction: 8,  ballSpeed: 7, playerSpeed: 6 }
        };

        let selectedDifficulty = 'medium';
        let gameRunning = false;
        let animationId = null;

        function applyDifficulty(level) {
            const d = difficulties[level] || difficulties.medium;
            computer.speed = d.computerSpeed;
            computer.reaction = d.computerReaction;
            ball.speed = d.ballSpeed;
            player.speed = d.playerSpeed;

            originalComputerSpeed = computer.speed;
            originalBallSpeed = ball.speed;

            // Ajusta a velocidade atual da bola mantendo a direção
            const signX = Math.sign(ball.dx) || (Math.random() > 0.5 ? 1 : -1);
            const signY = Math.sign(ball.dy) || (Math.random() > 0.5 ? 1 : -1);
            ball.dx = signX * ball.speed;
            ball.dy = signY * Math.min(Math.abs(ball.dy) || ball.speed * 0.5, ball.speed * 0.8);
        }

        // Input handling
        const keys = {};
        let mouseY = canvas.height / 2;

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        // Update player paddle position
        function updatePlayer() {
            // Keyboard controls
            if (keys['ArrowUp'] && player.y > 0) {
                player.y -= player.speed;
            }
            if (keys['ArrowDown'] && player.y + player.height < canvas.height) {
                player.y += player.speed;
            }

            // Mouse control (override)
            if (mouseY - player.height / 2 < 0) {
                player.y = 0;
            } else if (mouseY + player.height / 2 > canvas.height) {
                player.y = canvas.height - player.height;
            } else {
                player.y = mouseY - player.height / 2;
            }
        }

        // Update computer paddle position (AI)
        let computerFrozen = false;
        function updateComputer() {
            if (computerFrozen) return;
            const computerCenter = computer.y + computer.height / 2;
            const ballCenter = ball.y;

            // AI: segue a bola, com uma "zona morta" determinada por computer.reaction
            if (computerCenter < ballCenter - computer.reaction) {
                computer.y += computer.speed;
            } else if (computerCenter > ballCenter + computer.reaction) {
                computer.y -= computer.speed;
            }

            // Keep computer paddle in bounds
            if (computer.y < 0) {
                computer.y = 0;
            } else if (computer.y + computer.height > canvas.height) {
                computer.y = canvas.height - computer.height;
            }
        }

        // Update ball position
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom walls
            if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.size, Math.min(canvas.height - ball.size, ball.y));
            }

            // Ball collision with player paddle
            if (
                ball.x - ball.size < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = -ball.dx;
                ball.x = player.x + player.width + ball.size;
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (player.y + player.height / 2)) / (player.height / 2);
                ball.dy = hitPos * ball.speed;
            }

            // Ball collision with computer paddle
            if (
                ball.x + ball.size > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height
            ) {
                ball.dx = -ball.dx;
                ball.x = computer.x - ball.size;
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (computer.y + computer.height / 2)) / (computer.height / 2);
                ball.dy = hitPos * ball.speed;
            }

            // Ball out of bounds (scoring)
            if (ball.x < 0) {
                computer.score++;
                resetBall();
            }
            if (ball.x > canvas.width) {
                player.score++;
                resetBall();
            }

            // Check collision with power-ups
            checkPowerUpCollisions();
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            // Usa ball.speed para ajustar intensidade
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = (Math.random() - 0.5) * ball.speed * 0.6;
        }

        // Draw functions
        function drawPaddle(x, y, width, height) {
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(x, y, width, height);
            // Add glow effect
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.5)';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, width, height);
        }

        function drawBall(x, y, size) {
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
            // Add glow
            ctx.strokeStyle = 'rgba(255, 0, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawPowerUps() {
            powerUps.forEach(p => {
                ctx.beginPath();
                ctx.fillStyle = p.type === 'yellow' ? '#ffd700' : p.type === 'blue' ? '#1e90ff' : '#39e600';
                ctx.arc(p.x, p.y, powerUpRadius, 0, Math.PI * 2);
                ctx.fill();

                // draw symbol
                ctx.fillStyle = '#000';
                ctx.font = '16px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const symbol = p.type === 'yellow' ? '⚡' : p.type === 'blue' ? '❄' : '🐢';
                ctx.fillText(symbol, p.x, p.y + 1);

                // small glow
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }

        function drawCenterLine() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            drawCenterLine();

            // Draw paddles
            drawPaddle(player.x, player.y, player.width, player.height);
            drawPaddle(computer.x, computer.y, computer.width, computer.height);

            // Draw ball
            drawBall(ball.x, ball.y, ball.size);

            // Draw power-ups
            drawPowerUps();
        }

        function updateScore() {
            document.getElementById('playerScore').textContent = player.score;
            document.getElementById('computerScore').textContent = computer.score;
        }

        // Power-up spawning
        function spawnPowerUp() {
            if (!gameRunning) return;
            // choose random type
            const types = ['yellow', 'blue', 'green'];
            const type = types[Math.floor(Math.random() * types.length)];
            // random position, keep some margin
            const margin = 60;
            const x = Math.random() * (canvas.width - margin * 2) + margin;
            const y = Math.random() * (canvas.height - margin * 2) + margin;
            powerUps.push({ x, y, type });
            // schedule next spawn
            scheduleNextPowerUp();
        }

        function scheduleNextPowerUp() {
            // spawn every 4-8 seconds
            const interval = 4000 + Math.random() * 4000;
            if (powerUpSpawnTimer) clearTimeout(powerUpSpawnTimer);
            powerUpSpawnTimer = setTimeout(() => {
                if (gameRunning) spawnPowerUp();
            }, interval);
        }

        function clearAllPowerUps() {
            powerUps.length = 0;
            if (powerUpSpawnTimer) { clearTimeout(powerUpSpawnTimer); powerUpSpawnTimer = null; }
        }

        function checkPowerUpCollisions() {
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const p = powerUps[i];
                const dx = ball.x - p.x;
                const dy = ball.y - p.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < ball.size + powerUpRadius) {
                    // collect
                    applyPowerUp(p.type);
                    powerUps.splice(i, 1);
                }
            }
        }

        function applyPowerUp(type) {
            // clear previous timers affecting same resource
            if (type === 'yellow') {
                if (activeBallTimer) clearTimeout(activeBallTimer);
                // increase ball speed temporarily (4s)
                const factor = 1.6;
                ball.speed = Math.max(1, ball.speed * factor);
                // adjust dx/dy preserving direction
                const signX = Math.sign(ball.dx) || 1;
                const signY = Math.sign(ball.dy) || 1;
                ball.dx = signX * Math.max(1, Math.abs(ball.dx) * factor);
                ball.dy = signY * Math.max(1, Math.abs(ball.dy) * factor);

                activeBallTimer = setTimeout(() => {
                    // restore ball speed to original difficulty value
                    ball.speed = originalBallSpeed;
                    const sX = Math.sign(ball.dx) || 1;
                    const sY = Math.sign(ball.dy) || 1;
                    ball.dx = sX * Math.max(1, originalBallSpeed);
                    ball.dy = sY * Math.min(Math.abs(ball.dy), originalBallSpeed * 0.8);
                    activeBallTimer = null;
                }, 4000);
            } else if (type === 'blue') {
                // freeze enemy for 1s
                if (activeComputerTimer) clearTimeout(activeComputerTimer);
                computerFrozen = true;
                // visual cue: set speed to 0 but remember original
                // originalComputerSpeed already stored
                activeComputerTimer = setTimeout(() => {
                    computerFrozen = false;
                    activeComputerTimer = null;
                }, 1000);
            } else if (type === 'green') {
                // slow enemy for 3s
                if (activeComputerTimer) clearTimeout(activeComputerTimer);
                const slowFactor = 0.5;
                computer.speed = Math.max(0.5, originalComputerSpeed * slowFactor);
                activeComputerTimer = setTimeout(() => {
                    computer.speed = originalComputerSpeed;
                    activeComputerTimer = null;
                }, 3000);
            }
        }

        // Main game loop
        function gameLoop() {
            if (!gameRunning) return; // segurança
            updatePlayer();
            updateComputer();
            updateBall();
            updateScore();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        // Hook up difficulty buttons
        const difficultyButtons = document.querySelectorAll('.difficulty-btn');

        // Helper to enable/disable difficulty controls while the game is running
        function setDifficultyControlsEnabled(enabled) {
            difficultyButtons.forEach(btn => {
                btn.disabled = !enabled;
                btn.style.opacity = enabled ? '1' : '0.6';
                btn.style.pointerEvents = enabled ? 'auto' : 'none';
            });
        }

        difficultyButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (gameRunning) return; // impede mudança de dificuldade durante a partida
                // visual
                difficultyButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedDifficulty = btn.dataset.difficulty;
                applyDifficulty(selectedDifficulty);
            });
        });

        // Start button
        const startButton = document.getElementById('startButton');
        startButton.addEventListener('click', () => {
            if (gameRunning) return;
            // reset scores and positions
            player.score = 0;
            computer.score = 0;
            player.y = canvas.height / 2 - player.height / 2;
            computer.y = canvas.height / 2 - computer.height / 2;
            resetBall();

            applyDifficulty(selectedDifficulty);

            document.getElementById('playerScore').textContent = player.score;
            document.getElementById('computerScore').textContent = computer.score;

            gameRunning = true;
            startButton.style.display = 'none';
            // disable difficulty buttons while running
            setDifficultyControlsEnabled(false);

            // start power-up spawn loop
            if (!powerUpLoopActive) {
                powerUpLoopActive = true;
                scheduleNextPowerUp();
            }

            // start loop
            animationId = requestAnimationFrame(gameLoop);
        });

        // Initialize difficulty controls enabled (before game starts)
        setDifficultyControlsEnabled(true);

        // Initialize difficulty (padrão já marcado no HTML)
        applyDifficulty(selectedDifficulty);

        // Allow showing start button again when pressing Escape (opcional)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                // pause
                if (gameRunning) {
                    gameRunning = false;
                    startButton.textContent = 'RETOMAR';
                    startButton.style.display = 'block';
                    // enable difficulty controls when paused/stopped
                    setDifficultyControlsEnabled(true);
                    // pause power-up spawning
                    if (powerUpSpawnTimer) { clearTimeout(powerUpSpawnTimer); powerUpSpawnTimer = null; }
                }
            }
        });

    </script>
</body>
</html>
